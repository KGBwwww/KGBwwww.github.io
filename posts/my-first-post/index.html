<script>
window.addEventListener('DOMContentLoaded', () => {

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const toc = document.getElementById("TableOfContents");
      const id = entry.target.getAttribute('id');
      if (entry.intersectionRatio > 0) {
        toc.querySelector(`a[href="#${id}"]`).parentElement.classList.add('focus');
      } else {
        toc.querySelector(`a[href="#${id}"]`).parentElement.classList.remove('focus');
      }
    });
  });

  
  document.querySelectorAll('section[id]').forEach((section) => {
    observer.observe(section);
  });
  
});
</script>

<div id="recent-music"></div>

<script>
async function loadRecentMusic() {
  const res = await fetch('/.netlify/functions/recent-music');
  const data = await res.json();
  if (!data.title) return;

  document.getElementById('recent-music').innerHTML = `
    <div style="font-size:14px; opacity:0.75;">
      最近在听：
      <a href="${data.url}" target="_blank" style="text-decoration:none;">
        ${data.title} - ${data.artist}
      </a>
    </div>`;
}
loadRecentMusic();
</script>
