baseURL: https://kgbwwww.github.io/
locale: zh-cn
title: KGB专属黑客空间
theme : "PaperMod"
copyright: "Copyright © 2026 KGB & MLL"

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

minify:
  disableXML: true

pagination:
  disableAliases: false
  pagerSize: 5

languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Search/搜索
          url: search/
          weight: 10
        - name: Tags/标签
          url: tags/
          weight: 10
        - name: About/关于
          url: about/
          weight: 10
         

  fr:
    languageName: ":fr:"
    weight: 2
    title: PaperModL2
    taxonomies:
      category: FRcategories
      tag: FRtags
      series: FRseries
    menu:
      main:
        - name: FRTags
          url: frtags
          weight: 10
        - name: FRCategories
          url: frcategories
          weight: 10
        - name: FRSeries
          url: frseries
          weight: 10
        - name: NullLink
          url: "#"
    params:
      languageAltTitle: China
      profileMode:
        enabled: true
        title: PaperMod
        imageUrl: "https://raw.githubusercontent.com/googlefonts/noto-emoji/master/svg/emoji_u1f9d1_1f3fb_200d_1f4bb.svg"
        imageTitle: ProfileMode image
        subtitle: "☄️ Fast | ☁️ Fluent |   Smooth |   Responsive"
        buttons:
          - name: Blog
            url: posts
          - name: Profile Mode
            url: https://github.com/adityatelange/hugo-PaperMod/wiki/Features#profile-mode

  fa:
    languagedirection: rtl
    weight: 3
    title: PaperMod RTL
    taxonomies:
      category: FAcategories
      tag: FAtags
      series: FAseries
    menu:
      main:
        - name: FATags
          url: fatags
          weight: 10
    params:
      homeInfoParams:
        Title: "Hi there  "
        Content: Welcome to RTL layout

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  author: "KGB L"
  description: "AI 编译器 / 系统方向的成长日志"
  keywords: ["Hugo", "Blog", "PaperMod", "AI 编译器"]
  defaultTheme: auto
  ShowShareButtons: true
  ShowReadingTime: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  images: ["images/papermod-cover.png"]

  profileMode:
    enabled: true
    title: "欢迎来到我的博客"
    subtitle: "日记 | 摄影 | 旅行"
    imageUrl: "images/avatar.jpg"
    imageTitle: "头像"
    buttons:
      - name: 博客文章
        url: "/posts"
      - name: GitHub
        url: "https://github.com/KGBwwww"

  homeInfoParams:
    Title: "欢迎来到 K G B 的博客"
    Content: >
        这里记录我摄影/旅行/生活的点滴  
        技术沉淀 |   知识拓展 |   持续输出  

  socialIcons:
    - name: redbook
      url: "https://xhslink.com/m/9VAkkDbFZWv"
    - name: email
      url: "mailto:953783390@qq.com"
    - name: tiktok
      url: "https://v.douyin.com/VbrwxQoVGG0/ 5@3.com :4pm"
    - name: 
      url: ""

  editPost:
    URL: "https://github.com/KGBwwww/KGBwwww.github.io/tree/main/content"
    Text: "建议修改"
    appendFilePath: true

  assets:
    disableHLJS: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true