baseURL: https://kgbwwww.github.io/
locale: zh-cn
title: KGB个人博客
theme: [PaperMod, hugo-shortcode-gallery]
copyright: "Copyright © 2026 KGB & MLL"

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

minify:
  disableXML: true

pagination:
  disableAliases: false
  pagerSize: 5

languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Search
          url: search/
          weight: 1
        - name: Gallery
          url: gallery/
          weight: 5
        - name: Skills
          url: skills/
          weight: 10
        - name: Posts
          url: posts/
          weight: 2 
        - name: About
          url: about/
          weight: 100
        - name: Archive
          url: /archives/
          weight: 3




outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  author: "KGB L"
  description: "AI 编译器 / 系统方向的成长日志"
  keywords: ["Hugo", "Blog", "PaperMod", "AI 编译器"]
  defaultTheme: auto
  ShowShareButtons: false
  
  ShowReadingTime: false
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  images: ["images/papermod-cover.png"]
  assets:
    favicon : "images/avatar2.jpg"        # 浏览器标签图标
    favicon16x16 : "images/avatar2.jpg"   # 浏览器标签图标
    favicon32x32 : "images/avatar2.jpg"   # 浏览器标签图标
    disableHLJS : true  # 不使用highlight.js
  galleryLoadJQuery : true
  
  profileMode:
    enabled: true
    title: "欢迎来到我的博客"
    subtitle: "日记 | 摄影 | 旅行"
    imageUrl: "images/avatar.jpg"
    imageTitle: "头像"
    buttons:
      - name: 博客文章
        url: "/posts"
      - name: GitHub
        url: "https://github.com/KGBwwww"

  homeInfoParams:
    Title: "欢迎来到 KGB 的博客"
    Content: >
        这里记录我摄影/旅行/生活的点滴  
        技术沉淀 |  知识拓展 |  持续输出  

  socialIcons:
    - name: xhs
      url: "https://xhslink.com/m/9VAkkDbFZWv"
    - name: email
      url: "mailto:953783390@qq.com"
    - name: tiktok
      url: "https://v.douyin.com/VbrwxQoVGG0/ 5@3.com :4pm"
    - name: 
      url: ""




markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true
    
  cover:
    hiddenInList: false # 在文章列表和首页显示封面
    hiddenInSingle: true # 在单页隐藏封面
